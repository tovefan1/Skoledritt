<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Skoledritt</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;
    width: 80%;
  }

  h1 {
    font-size: 2.5rem;
  }

  .timer {
    font-size: 3rem;
    margin: 20px 0;
  }

  .progress-container {
    width: 100%;
    height: 25px;
    background: #e8e3e3;
    border-radius: 20px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: #FFFFFF;
    transition: width 0.3s;
  }

  .finished {
    color: #00cc66 !important;
  }

  .finished-bar {
    background: #00cc66 !important;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Skole igjen i år desverre </h1>
  <div class="timer" id="totalTimer">Laster…</div>
  <div class="progress-container">
    <div class="progress-bar" id="totalProgress"></div>
  </div>
</div>

  <p class="description">
  Ny niche nedtelling av Lencner? tror den gjelder for alle klassene!
</p>

<a href="https://tovefan1.github.io/Skolefaen/" target="_blank" class="link-button">
  Gå til min andre peake nettside!
</a>

<script>

// =====================
// DATOER (2026)
// =====================

const dates = [
"17.04.26","20.04.26","21.04.26","22.04.26","23.04.26","24.04.26",
"27.04.26","28.04.26","29.04.26","30.04.26",
"04.05.26","05.05.26","06.05.26","07.05.26","08.05.26",
"11.05.26","12.05.26","13.05.26","15.05.26",
"18.05.26","19.05.26","20.05.26","21.05.26","22.05.26",
"26.05.26","27.05.26","28.05.26","29.05.26",
"01.06.26","02.06.26","03.06.26","04.06.26","05.06.26",
"08.06.26","09.06.26","11.06.26","12.06.26",
"15.06.26","16.06.26","17.06.26","18.06.26"
];

// =====================
// DATE HELPER
// =====================

function parseDate(dateStr, timeStr) {
  const [day, month, year] = dateStr.split(".");
  const [hour, minute] = timeStr.split(":");
  return new Date(`20${year}-${month}-${day}T${hour}:${minute}:00`);
}

// =====================
// BUILD PERIODS
// =====================

let periods = [];

dates.forEach(date => {
  const d = parseDate(date, "00:00");
  const day = d.getDay(); // 3 = Wednesday

  // Start always 08:30
  const start = parseDate(date, "08:30");

  // End depends on day
  let end;
  if (day === 3) {
    end = parseDate(date, "14:45"); // Wednesday
  } else {
    end = parseDate(date, "14:00");
  }

  periods.push({ start, end });
});

// =====================
// TOTAL TIME
// =====================

const totalSeconds = periods.reduce(
  (a,p)=>a+(p.end-p.start)/1000,0
);

// =====================
// REMAINING TIME
// =====================

function remainingSeconds() {
  const now = new Date();
  return periods.reduce((a,p)=>{
    if (now < p.start) return a + (p.end-p.start)/1000;
    if (now < p.end) return a + (p.end-now)/1000;
    return a;
  },0);
}

// =====================
// FINISH HELPER
// =====================

function markFinished(rem) {
  if (rem <= 0) {
    const timer = document.getElementById("totalTimer");
    const bar = document.getElementById("totalProgress");

    timer.classList.add("finished");
    bar.classList.add("finished-bar");

    timer.textContent = "Ferdig!";
    bar.style.width = "100%";
  }
}

// =====================
// UPDATE
// =====================

function update() {
  const rem = remainingSeconds();
  const done = totalSeconds - rem;

  const h = Math.floor(rem/3600);
  const m = Math.floor((rem%3600)/60);
  const s = Math.floor(rem%60);

  document.getElementById("totalTimer").textContent =
    `${h}t ${m}m ${s}s`;

  document.getElementById("totalProgress").style.width =
    `${(done/totalSeconds)*100}%`;

  markFinished(rem);
}

setInterval(update, 1000);
update();

</script>

</body>
</html>
